  </defs>
  <rect rx="32" ry="32" x="16" y="16" width="480" height="480" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <rect rx="24" ry="24" x="48" y="64" width="416" height="384" fill="#edf2f7" stroke="#d1d5db" stroke-width="1.5"/>
