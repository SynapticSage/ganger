  <!-- star -->
  <path d="M256.00,202.00 L268.93,232.20 L301.65,235.17 L276.92,256.80 L284.21,288.83 L256.00,272.00 L227.79,288.83 L235.08,256.80 L210.35,235.17 L243.07,232.20 Z" fill="#be7c00" filter="url(#shadow)"/>
