  <path d="M 136 372 A 136 136 0 0 0 400 372" fill="none" stroke="#7c3aed" stroke-opacity="0.35" stroke-width="10" stroke-linecap="round"/>
</svg>
  </g>
  <!-- Wordmark -->
  <g transform="translate(420,215)">
