    <line x1="216" y1="156" x2="312" y2="156"/>
    <line x1="216" y1="196" x2="312" y2="196"/>
    <line x1="216" y1="236" x2="312" y2="236"/>
    <line x1="216" y1="276" x2="312" y2="276"/>
